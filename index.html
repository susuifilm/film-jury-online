<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小群评审席 Online</title>
  <style>
    :root {
      --ink: #211d1a;
      --muted: #71695f;
      --line: #d9d0c4;
      --paper: #f7f2ea;
      --panel: #fffaf2;
      --gold: #b6842c;
      --red: #9a3d35;
      --green: #4c7556;
      --blue: #4b667f;
      --shadow: 0 12px 30px rgba(42, 34, 24, .1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf8;
      color: var(--ink);
      cursor: pointer;
    }
    button:hover { border-color: #bba783; }
    button:disabled { opacity: .6; cursor: progress; }
    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
      padding: 8px 10px;
      color: var(--ink);
    }
    textarea { min-height: 82px; resize: vertical; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 800; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(130, 108, 70, .28);
      background: rgba(247, 242, 234, .95);
      backdrop-filter: blur(14px);
    }
    .topbar {
      max-width: 1520px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    h1 { margin: 0; font-size: 26px; line-height: 1.05; }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .userbox { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #ece0ca;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    main {
      max-width: 1520px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, .95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .head {
      min-height: 52px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: rgba(255, 246, 225, .72);
    }
    .head h2, .section-title { margin: 0; font-size: 15px; }
    .body { padding: 14px; }
    .stack { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .primary { border-color: #8b6726; background: var(--gold); color: #fffaf0; font-weight: 800; }
    .danger { border-color: #b98780; color: var(--red); }
    .hidden { display: none !important; }
    .status { color: var(--blue); font-size: 13px; min-height: 20px; }
    .empty, .locked {
      border: 1px dashed #c9bba6;
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 253, 248, .72);
      text-align: center;
    }
    .film-list, .judge-list, .score-board, .leaderboard, .bars { display: grid; gap: 9px; }
    .row {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
    }
    .poster {
      width: 52px;
      height: 74px;
      border-radius: 5px;
      border: 1px solid #cdbf9f;
      background: linear-gradient(145deg, rgba(154, 61, 53, .95), rgba(33, 29, 26, .88));
      color: #fff3d1;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-weight: 900;
    }
    .poster.large { width: 86px; height: 122px; }
    .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .title { min-width: 0; }
    .title strong { display: block; overflow-wrap: anywhere; line-height: 1.25; }
    .title span { display: block; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .icon { width: 38px; padding: 0; font-size: 17px; }
    .score-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      overflow: hidden;
    }
    .score-head {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 246, 225, .55);
    }
    .score-head h3 { margin: 0; font-size: 18px; }
    .score-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .intro { color: var(--ink) !important; font-size: 13px !important; }
    .screening { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    .criterion {
      display: grid;
      grid-template-columns: minmax(150px, 230px) minmax(180px, 1fr) 116px;
      gap: 9px;
      align-items: center;
      min-height: 58px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(216, 208, 196, .65);
    }
    .criterion:last-child { border-bottom: 0; }
    .criterion span { display: block; color: var(--muted); font-size: 11px; }
    .num {
      min-height: 40px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: #f2e6d3;
      color: var(--red);
      font-weight: 900;
      font-size: 17px;
    }
    input[type="range"] {
      padding: 0;
      accent-color: var(--gold);
      min-height: 38px;
      cursor: pointer;
    }
    .stepper {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 4px;
      align-items: center;
    }
    .stepper button {
      min-height: 40px;
      padding: 0;
      font-size: 16px;
      font-weight: 900;
      color: var(--gold);
    }
    .reveal { padding: 10px 12px 12px; border-top: 1px solid var(--line); background: rgba(246, 239, 226, .55); }
    .mini-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 7px; }
    .mini {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 8px;
      background: #fffdf8;
      font-size: 12px;
    }
    .mini strong { display: block; color: var(--red); font-size: 16px; }
    .rank {
      display: grid;
      grid-template-columns: 30px 52px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
    }
    .rank-no { color: var(--gold); font-weight: 900; text-align: center; }
    .rank-score { color: var(--red); font-size: 20px; font-weight: 900; min-width: 64px; text-align: right; }
    .bar-row { display: grid; gap: 5px; }
    .bar-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
    .bar { height: 8px; border-radius: 999px; overflow: hidden; background: #eadfcd; }
    .bar i { display: block; height: 100%; background: var(--green); }
    @media (max-width: 1180px) { main { grid-template-columns: 1fr 1fr; } .right { grid-column: 1 / -1; } }
    @media (max-width: 820px) { .topbar, main, .grid-2, .grid-3, .screening { grid-template-columns: 1fr; } .criterion { grid-template-columns: 1fr; } .criterion input { width: 100%; } .stepper { grid-template-columns: 52px 1fr 52px; } }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>小群评审席</h1>
        <p class="sub">在线评委账号、影片资料、十项评分和揭榜权限。</p>
      </div>
      <div class="userbox" id="userBox"></div>
    </div>
  </header>

  <main id="app" class="hidden">
    <aside class="panel admin-only hidden">
      <div class="head"><h2>管理员</h2><span class="badge" id="adminCount">0</span></div>
      <div class="body stack">
        <form id="doubanForm" class="stack">
          <label>豆瓣链接
            <input id="doubanUrl" placeholder="movie.douban.com/subject/...">
          </label>
          <label>抓取失败时粘贴豆瓣文本
            <textarea id="doubanText" placeholder="可选"></textarea>
          </label>
          <button class="primary" id="doubanBtn">抓取到表单</button>
          <div class="status" id="doubanStatus"></div>
        </form>

        <form id="filmForm" class="stack">
          <label>片名<input id="filmTitle" required></label>
          <div class="grid-3">
            <label>导演<input id="filmDirector"></label>
            <label>豆瓣评分<input id="filmRating" inputmode="decimal"></label>
            <label>上映日期<input id="filmDate"></label>
          </div>
          <label>海报链接<input id="filmPoster"></label>
          <label>简介<textarea id="filmIntro"></textarea></label>
          <div class="grid-2">
            <button class="primary" id="filmSubmit">加入影片</button>
            <button type="button" id="filmCancel" class="hidden">取消编辑</button>
          </div>
        </form>

        <div class="film-list" id="filmList"></div>

        <h3 class="section-title">评委账号</h3>
        <form id="judgeForm" class="stack">
          <label>邮箱<input id="judgeEmail" type="email" required></label>
          <label>昵称<input id="judgeName" required></label>
          <label>初始密码<input id="judgePassword" type="password" required></label>
          <button class="primary">创建评委账号</button>
        </form>
        <div class="judge-list" id="judgeList"></div>
      </div>
    </aside>

    <section class="panel">
      <div class="head"><h2>评分</h2><span class="badge" id="scoreBadge">未登录</span></div>
      <div class="body">
        <label class="admin-only hidden">管理员查看/编辑评委
          <select id="adminJudgeSelect"></select>
        </label>
        <div class="score-board" id="scoreBoard"></div>
      </div>
    </section>

    <aside class="panel right">
      <div class="head"><h2>揭榜区</h2><button id="exportBtn" class="admin-only hidden">导出 CSV</button></div>
      <div class="body stack">
        <div class="leaderboard" id="leaderboard"></div>
        <h3 class="section-title">各项均分</h3>
        <div class="bars" id="categoryBars"></div>
        <h3 class="section-title">每片影厅统计</h3>
        <div class="bars" id="screeningStats"></div>
      </div>
    </aside>
  </main>

  <section class="panel" id="loginPanel" style="max-width:460px;margin:40px auto;">
    <div class="head"><h2>登录</h2><span class="badge">Supabase</span></div>
    <div class="body">
      <form id="loginForm" class="stack">
        <label>邮箱<input id="loginEmail" type="email" required></label>
        <label>密码<input id="loginPassword" type="password" required></label>
        <button class="primary">登录</button>
        <div class="status" id="loginStatus"></div>
      </form>
    </div>
  </section>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://dmbgjvhyecrrgntbkago.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtYmdqdmh5ZWNycmdudGJrYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTIzNTEsImV4cCI6MjA5NzAyODM1MX0.1lzxZvW9KKNf4MdqIOIpXLKhayua_9c-2epy2rRhyWY";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ITEMS = [
      ["score", "配乐与歌曲", "Score"],
      ["makeup_costume", "妆发与服装设计", "Make up & Hairstyling / Costume Design"],
      ["production_design", "艺术审美", "Production Design"],
      ["sound", "音响效果", "Sound"],
      ["visual_effect", "视觉效果", "Visual Effect"],
      ["film_editing", "剪辑效果", "Film Editing"],
      ["cinematography", "摄影", "Cinematography"],
      ["screenplay", "剧本", "Screenplay"],
      ["acting", "表演", "Actor / Actress"],
      ["summary", "总评", "Summary"]
    ];
    const THEATERS = ["IMAX", "杜比影院", "CINITY/CLED", "LED/普通厅"];
    const VERSIONS = ["2D", "3D"];

    let authUser = null;
    let profile = null;
    let films = [];
    let profiles = [];
    let reviews = [];
    let results = [];
    let screeningStats = [];
    let editingFilmId = null;
    let activeJudgeId = null;

    const $ = (selector) => document.querySelector(selector);
    const el = {
      app: $("#app"),
      loginPanel: $("#loginPanel"),
      userBox: $("#userBox"),
      loginForm: $("#loginForm"),
      loginStatus: $("#loginStatus"),
      filmForm: $("#filmForm"),
      filmSubmit: $("#filmSubmit"),
      filmCancel: $("#filmCancel"),
      filmList: $("#filmList"),
      judgeForm: $("#judgeForm"),
      judgeList: $("#judgeList"),
      adminJudgeSelect: $("#adminJudgeSelect"),
      scoreBoard: $("#scoreBoard"),
      scoreBadge: $("#scoreBadge"),
      leaderboard: $("#leaderboard"),
      categoryBars: $("#categoryBars"),
      screeningStats: $("#screeningStats"),
      exportBtn: $("#exportBtn"),
      adminCount: $("#adminCount"),
      doubanForm: $("#doubanForm"),
      doubanBtn: $("#doubanBtn"),
      doubanStatus: $("#doubanStatus")
    };

    function html(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function ratingValue(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function isAdmin() {
      return profile?.role === "admin";
    }

    function reviewComplete(review) {
      return ITEMS.every(([id]) => typeof review?.[id] === "number");
    }

    function reviewAvg(review) {
      const values = ITEMS.map(([id]) => review?.[id]).filter(v => typeof v === "number");
      return values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;
    }

    function resultFor(filmId) {
      return results.find(r => r.film_id === filmId);
    }

    function ownReviewFor(filmId, judgeId = activeJudgeId) {
      return reviews.find(r => r.film_id === filmId && r.judge_id === judgeId);
    }

    function canSeeResult(filmId) {
      if (isAdmin()) return true;
      return Boolean(results.find(r => r.film_id === filmId));
    }

    function poster(film, large = false) {
      const cls = large ? "poster large" : "poster";
      return film.poster_url
        ? `<div class="${cls}"><img src="${html(imageSrc(film.poster_url))}" alt="${html(film.title)}海报" onerror="this.remove()"></div>`
        : `<div class="${cls}">${html((film.title || "?").slice(0, 1))}</div>`;
    }

    function imageSrc(url) {
      if (!url) return "";
      if (/doubanio\.com|douban\.com/.test(url)) {
        const clean = url.replace(/^https?:\/\//, "");
        return `https://images.weserv.nl/?url=${encodeURIComponent(clean)}`;
      }
      return url;
    }

    function filmMeta(film) {
      return [
        film.director ? `导演 ${film.director}` : "",
        film.release_date ? `上映 ${film.release_date}` : "",
        film.douban_rating ? `豆瓣 ${film.douban_rating}` : ""
      ].filter(Boolean).join(" · ") || "资料待补充";
    }

    async function api(path, options = {}) {
      const { data: sessionData } = await supabase.auth.getSession();
      const token = sessionData.session?.access_token;
      const response = await fetch(path, {
        ...options,
        headers: {
          "content-type": "application/json",
          authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    async function loadAll() {
      try {
        const { data: userData } = await supabase.auth.getUser();
        authUser = userData.user;
        if (!authUser) {
          renderAuth();
          return;
        }

        const { data: myProfile, error: profileError } = await supabase
          .from("profiles")
          .select("*")
          .eq("user_id", authUser.id)
          .single();
        if (profileError || !myProfile) {
          await supabase.auth.signOut();
          el.loginStatus.textContent = `账号还没有被管理员授权。${profileError?.message || ""}`;
          renderAuth();
          return;
        }
        profile = myProfile;
        activeJudgeId = isAdmin() ? activeJudgeId || authUser.id : authUser.id;

        const [filmsRes, reviewsRes, resultsRes, screeningStatsRes] = await Promise.all([
          supabase.from("films").select("*").order("sort_order").order("created_at"),
          supabase.from("reviews").select("*"),
          supabase.rpc("get_visible_results"),
          supabase.rpc("get_visible_screening_stats")
        ]);
        if (filmsRes.error) throw new Error(`读取影片失败：${filmsRes.error.message}`);
        if (reviewsRes.error) throw new Error(`读取评分失败：${reviewsRes.error.message}`);
        if (resultsRes.error) throw new Error(`读取揭榜数据失败：${resultsRes.error.message}`);
        films = filmsRes.data || [];
        reviews = reviewsRes.data || [];
        results = resultsRes.data || [];
        screeningStats = screeningStatsRes.error ? [] : (screeningStatsRes.data || []);

        if (isAdmin()) {
          const { data, error } = await supabase.from("profiles").select("*").order("created_at");
          if (error) throw new Error(`读取评委账号失败：${error.message}`);
          profiles = data || [];
          if (!profiles.some(p => p.user_id === activeJudgeId)) activeJudgeId = profiles[0]?.user_id || authUser.id;
        } else {
          profiles = [profile];
        }

        render();
      } catch (error) {
        el.loginStatus.textContent = error.message || "加载失败，请检查 Supabase 权限。";
        renderAuth();
      }
    }

    function renderAuth() {
      el.app.classList.toggle("hidden", !authUser || !profile);
      el.loginPanel.classList.toggle("hidden", Boolean(authUser && profile));
      el.userBox.innerHTML = authUser && profile
        ? `<span class="badge">${html(profile.display_name)} · ${profile.role === "admin" ? "管理员" : "评委"}</span><button id="logoutBtn">退出</button>`
        : "";
      $("#logoutBtn")?.addEventListener("click", async () => {
        await supabase.auth.signOut();
        authUser = null;
        profile = null;
        renderAuth();
      });
    }

    function render() {
      renderAuth();
      document.querySelectorAll(".admin-only").forEach(node => node.classList.toggle("hidden", !isAdmin()));
      el.adminCount.textContent = `${films.length} 片 / ${profiles.length} 人`;
      renderFilms();
      renderJudges();
      renderScores();
      renderResults();
      renderScreeningStats();
    }

    function renderFilms() {
      if (!isAdmin()) return;
      el.filmList.innerHTML = films.length ? films.map(film => `
        <article class="row">
          ${poster(film)}
          <div class="title"><strong>${html(film.title)}</strong><span>${html(filmMeta(film))}</span></div>
          <div class="actions">
            <button class="icon" data-edit-film="${film.id}">✎</button>
            <button class="icon danger" data-delete-film="${film.id}">×</button>
          </div>
        </article>
      `).join("") : `<div class="empty">还没有影片。</div>`;
    }

    function renderJudges() {
      if (!isAdmin()) return;
      el.adminJudgeSelect.innerHTML = profiles.map(p => `<option value="${p.user_id}" ${activeJudgeId === p.user_id ? "selected" : ""}>${html(p.display_name)} (${p.role})</option>`).join("");
      el.judgeList.innerHTML = profiles.map(p => `
        <article class="row">
          <div class="poster">${html(p.display_name.slice(0, 1))}</div>
          <div class="title">
            <label>邮箱<input value="${html(p.email || "")}" data-account-email="${p.user_id}"></label>
            <label>昵称<input value="${html(p.display_name)}" data-account-name="${p.user_id}"></label>
            <label>重置密码<input type="password" placeholder="留空不修改" data-account-password="${p.user_id}"></label>
          </div>
          <div class="actions">
            <button class="icon" data-save-account="${p.user_id}">✓</button>
            ${p.user_id === authUser.id ? "" : `<button class="icon danger" data-delete-account="${p.user_id}">×</button>`}
          </div>
        </article>
      `).join("");
    }

    function renderScores() {
      const judge = profiles.find(p => p.user_id === activeJudgeId) || profile;
      el.scoreBadge.textContent = judge?.display_name || "未选择";
      if (!films.length) {
        el.scoreBoard.innerHTML = `<div class="empty">管理员添加影片后开始评分。</div>`;
        return;
      }
      el.scoreBoard.innerHTML = films.map(film => {
        const review = ownReviewFor(film.id, activeJudgeId) || {};
        const avg = reviewAvg(review);
        const visible = canSeeResult(film.id);
        const result = resultFor(film.id);
        return `
          <article class="score-card" data-film-card="${film.id}">
            <div class="score-head">
              ${poster(film, true)}
              <div>
                <h3>${html(film.title)}</h3>
                <p>${html(filmMeta(film))}</p>
                ${film.intro ? `<p class="intro">${html(film.intro)}</p>` : ""}

              </div>
            </div>
            <div class="screening">
              <label>观看影厅
                <select data-review-field="theater" data-film-id="${film.id}">
                  <option value="">未选择</option>
                  ${THEATERS.map(v => `<option value="${v}" ${review.theater === v ? "selected" : ""}>${v}</option>`).join("")}
                </select>
              </label>
              <label>观看版本
                <select data-review-field="version" data-film-id="${film.id}">
                  <option value="">未选择</option>
                  ${VERSIONS.map(v => `<option value="${v}" ${review.version === v ? "selected" : ""}>${v}</option>`).join("")}
                </select>
              </label>
            </div>
            ${ITEMS.map(([id, zh, en]) => {
              const value = review[id];
              return `<div class="criterion">
                <div><strong>${zh}</strong><span>${en}</span></div>
                <input type="range" min="1" max="10" step="0.5" value="${typeof value === "number" ? value : 1}" data-score="${id}" data-film-id="${film.id}">
                <div class="stepper">
                  <button type="button" data-step-score="${id}" data-step="-0.5" data-film-id="${film.id}" aria-label="${zh} 减 0.5">▼</button>
                  <div class="num">${typeof value === "number" ? value.toFixed(1) : "-"}</div>
                  <button type="button" data-step-score="${id}" data-step="0.5" data-film-id="${film.id}" aria-label="${zh} 加 0.5">▲</button>
                </div>
              </div>`;
            }).join("")}
            <div class="reveal">${visible ? renderReveal(result) : `<div class="locked">总评分和各项评分已隐藏。打完这部片 10 个项目后自动解锁。</div>`}</div>
          </article>
        `;
      }).join("");
    }

    function renderReveal(result) {
      if (!result) return `<div class="locked">还没有完整评分可汇总。</div>`;
      const values = [
        ["全体总评", result.average_score],
        ["完整评分人数", result.completed_review_count],
        ...ITEMS.map(([id, zh]) => [zh, result[`${id}_avg`]])
      ];
      return `<div class="mini-grid">${values.map(([label, value]) => `<div class="mini"><strong>${value ?? "-"}</strong>${label}</div>`).join("")}</div>`;
    }

    function renderResults() {
      const ranked = results.slice().sort((a, b) => Number(b.average_score || -1) - Number(a.average_score || -1));
      el.leaderboard.innerHTML = films.length ? films.map(film => {
        const r = ranked.find(item => item.film_id === film.id);
        const rank = r ? ranked.findIndex(item => item.film_id === film.id) + 1 : "—";
        return `<article class="rank">
          <div class="rank-no">${rank}</div>
          ${poster(film)}
          <div class="title"><strong>${html(film.title)}</strong><span>${r ? `${r.completed_review_count} 人完整评分 · 分歧 ${r.score_spread ?? "-"}` : "完成你的评分后显示"}</span></div>
          <div class="rank-score">${r?.average_score ?? "隐藏"}</div>
        </article>`;
      }).join("") : `<div class="empty">等待影片。</div>`;

      const categoryRows = ITEMS.map(([id, zh]) => {
        const values = results.map(r => Number(r[`${id}_avg`])).filter(Number.isFinite);
        const avg = values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;
        return { zh, avg };
      }).filter(r => r.avg !== null).sort((a, b) => b.avg - a.avg);
      el.categoryBars.innerHTML = categoryRows.length ? categoryRows.map(row => `
        <div class="bar-row"><div class="bar-label"><span>${row.zh}</span><strong>${row.avg.toFixed(2)}</strong></div><div class="bar"><i style="width:${row.avg * 10}%"></i></div></div>
      `).join("") : `<div class="empty">打完至少一部片后显示。</div>`;
    }

    function renderScreeningStats() {
      const theater = screeningStats.filter(row => row.stat_type === "theater" && Number(row.total) > 0);
      const max = Math.max(...screeningStats.map(row => Number(row.total) || 0), 1);
      el.screeningStats.innerHTML = theater.length ? theater.map(row => `
        <div class="bar-row">
          <div class="bar-label"><span>${html(row.film_title)} · ${html(row.label)}</span><strong>${row.total}</strong></div>
          <div class="bar"><i style="width:${Math.max(6, Number(row.total) / max * 100)}%"></i></div>
        </div>
      `).join("") : `<div class="empty">暂无每部影片的影厅统计。</div>`;
    }

    async function upsertReview(filmId, patch) {
      const base = ownReviewFor(filmId, activeJudgeId) || { film_id: filmId, judge_id: activeJudgeId };
      const next = { ...base, ...patch };
      const { error } = await supabase.from("reviews").upsert(next, { onConflict: "film_id,judge_id" });
      if (error) throw error;
      const index = reviews.findIndex(r => r.film_id === filmId && r.judge_id === activeJudgeId);
      if (index >= 0) reviews[index] = next;
      else reviews.push(next);
      await refreshResults();
    }

      if (error) throw error;
      results = data || [];

      screeningStats = statsData || [];

    async function fetchDouban(event) {
      event.preventDefault();
      const raw = `${$("#doubanUrl").value}\n${$("#doubanText").value}`.trim();
      if (!raw) return;
      el.doubanBtn.disabled = true;
      el.doubanStatus.textContent = "正在尝试抓取...";
      try {
        const url = normalizeDoubanUrl(raw);
        if (!url) throw new Error("no url");
        const html = await fetchText(url);
        fillFilmForm(parseDoubanHtml(html));
        el.doubanStatus.textContent = "已填入表单。";
      } catch {
        const parsed = parseDoubanText(raw);
        fillFilmForm(parsed);
        el.doubanStatus.textContent = parsed.title ? "抓取受限，已从文本识别部分资料。" : "没有抓到，请手动填写。";
      } finally {
        el.doubanBtn.disabled = false;
      }
    }

    function normalizeDoubanUrl(text) {
      const decoded = decodeURIComponent(text);
      const match = decoded.match(/movie\.douban\.com\/subject\/(\d+)/) || decoded.match(/\/movie\/(\d+)/);
      return match ? `https://movie.douban.com/subject/${match[1]}/` : "";
    }

    async function fetchText(url) {
      for (const attempt of [url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`]) {
        try {
          const res = await fetch(attempt);
          if (res.ok) return await res.text();
        } catch {}
      }
      throw new Error("fetch failed");
    }

    function parseDoubanHtml(rawHtml) {
      const doc = new DOMParser().parseFromString(rawHtml, "text/html");
      const jsonLd = [...doc.querySelectorAll('script[type="application/ld+json"]')].map(s => {
        try { return JSON.parse(s.textContent.replace(/^\s*<!--|-->\s*$/g, "")); } catch { return null; }
      }).find(Boolean) || {};
      return {
        title: jsonLd.name || doc.querySelector('meta[property="og:title"]')?.content || "",
        director: [...doc.querySelectorAll('a[rel="v:directedBy"]')].map(a => a.textContent.trim()).join(" / "),
        douban_rating: jsonLd.aggregateRating?.ratingValue || doc.querySelector(".rating_num")?.textContent?.trim() || "",
        release_date: jsonLd.datePublished || doc.querySelector('[property="v:initialReleaseDate"]')?.textContent?.trim() || "",
        poster_url: jsonLd.image || doc.querySelector('meta[property="og:image"]')?.content || "",
        intro: doc.querySelector('span[property="v:summary"]')?.textContent?.replace(/\s+/g, " ").trim() || ""
      };
    }

    function parseDoubanText(text) {
      const clean = text.replace(/\s+/g, " ").trim();
      return {
        title: clean.match(/《([^》]+)》/)?.[1] || "",
        director: clean.match(/导演[:：]\s*([^，。\n]+)/)?.[1] || "",
        douban_rating: clean.match(/(?:豆瓣评分|评分)[:：]?\s*([0-9.]+)/)?.[1] || "",
        release_date: clean.match(/([0-9]{4}[-年][0-9]{1,2}[-月][0-9]{1,2})/)?.[1] || "",
        poster_url: "",
        intro: clean.match(/(?:简介|剧情简介)[:：]\s*(.+)$/)?.[1] || ""
      };
    }

    function exportCsv() {
      const header = ["片名", "全体总评", "完整评分人数", ...ITEMS.map(([, zh]) => zh)];
      const rows = results.map(r => [r.title, r.average_score ?? "", r.completed_review_count, ...ITEMS.map(([id]) => r[`${id}_avg`] ?? "")]);
      const csv = [header, ...rows].map(row => row.map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `film-jury-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
